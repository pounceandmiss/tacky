<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="256" height="256" viewBox="0 0 256 256" version="1.1"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bubbleGrad" gradientUnits="userSpaceOnUse" x1="48" y1="24" x2="208" y2="226">
      <stop offset="0" stop-color="#00f0ff"/>
      <stop offset="0.5" stop-color="#10c8e0"/>
      <stop offset="1" stop-color="#0a7fb8"/>
    </linearGradient>
    <radialGradient id="bulbGlass" gradientUnits="userSpaceOnUse" cx="128" cy="86" r="56">
      <stop offset="0" stop-color="#fffef0"/>
      <stop offset="0.5" stop-color="#ffe83a"/>
      <stop offset="1" stop-color="#ff9d00"/>
    </radialGradient>
    <radialGradient id="glow" gradientUnits="userSpaceOnUse" cx="128" cy="90" r="78">
      <stop offset="0" stop-color="#fff27a" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#fff27a" stop-opacity="0"/>
    </radialGradient>
    <!-- bubble interior used to keep glow/rays from leaking past the edge -->
    <clipPath id="bubbleClip">
      <path d="m 48,24 h 160 a 24,24 0 0 1 24,24 v 120 a 24,24 0 0 1 -24,24 h -98 l -40,34 a 4,4 0 0 1 -6.5,-3.5 l 6.5,-30.5 h -22 a 24,24 0 0 1 -24,-24 V 48 a 24,24 0 0 1 24,-24 z"/>
    </clipPath>
  </defs>

  <!-- speech bubble with bottom-left tail -->
  <path style="fill:url(#bubbleGrad);stroke:#0a5f8c;stroke-width:3;stroke-linejoin:round"
        d="m 48,24 h 160 a 24,24 0 0 1 24,24 v 120 a 24,24 0 0 1 -24,24 h -98 l -40,34 a 4,4 0 0 1 -6.5,-3.5 l 6.5,-30.5 h -22 a 24,24 0 0 1 -24,-24 V 48 a 24,24 0 0 1 24,-24 z"/>

  <!-- top sheen -->
  <path style="fill:#ffffff;opacity:0.22"
        d="m 48,32 h 152 a 16,16 0 0 1 16,16 v 38 q -88,24 -176,0 v -38 a 16,16 0 0 1 8,-16 z"/>
  <path style="fill:none;stroke:#ffffff;stroke-width:2.5;stroke-linecap:round;stroke-opacity:0.55"
        d="m 52,28 h 152 a 20,20 0 0 1 20,20 v 12"/>

  <g clip-path="url(#bubbleClip)">
    <!-- radiant glow behind bulb -->
    <circle cx="128" cy="90" r="74" fill="url(#glow)"/>

    <!-- emission rays: 5 even spokes (45 deg apart) around the bulb, all inside -->
    <g style="stroke:#ff2e88;stroke-width:6;stroke-linecap:round;opacity:0.95">
      <line x1="80" y1="90" x2="68" y2="90"/>
      <line x1="94.06" y1="56.06" x2="85.57" y2="47.57"/>
      <line x1="128" y1="42" x2="128" y2="30"/>
      <line x1="161.94" y1="56.06" x2="170.43" y2="47.57"/>
      <line x1="176" y1="90" x2="188" y2="90"/>
    </g>
  </g>

  <!-- glowing lightbulb -->
  <path style="fill:url(#bulbGlass);stroke:#c25a00;stroke-width:3;stroke-linejoin:round"
        d="m 128,50 c -24,0 -40,18 -40,40 0,14 8,24 16,34 6,8 8,14 8,22 h 32 c 0,-8 2,-14 8,-22 8,-10 16,-20 16,-34 0,-22 -16,-40 -40,-40 z"/>

  <!-- filament -->
  <path style="fill:none;stroke:#c25a00;stroke-width:2.5;stroke-linecap:round"
        d="M 111.99706,117.68758 116,100 c 6,-24 15.70665,20.36886 23.71333,0 3.96222,-10.160935 3.14664,11.16391 5.14996,18.10754"/>

  <!-- glass highlight -->
  <path style="fill:none;stroke:#ffffff;stroke-width:4;stroke-linecap:round;opacity:0.8"
        d="m 104,76 q -4,14 2,28"/>

  <!-- screw base -->
  <path style="fill:#e0e0e0;stroke:#37474f;stroke-width:2"
        d="m 112,148 h 32 c 1.108,0 2,0.892 2,2 v 4 c 0,1.108 -0.892,2 -2,2 h -32 c -1.108,0 -2,-0.892 -2,-2 v -4 c 0,-1.108 0.892,-2 2,-2 z"/>
  <path style="fill:#bdbdbd;stroke:#37474f;stroke-width:2"
        d="m 113,158 h 30 c 0.554,0 1,0.446 1,1 v 4 c 0,0.554 -0.446,1 -1,1 h -30 c -0.554,0 -1,-0.446 -1,-1 v -4 c 0,-0.554 0.446,-1 1,-1 z"/>
  <path style="fill:#78909c;stroke:#37474f;stroke-width:2;stroke-linejoin:round"
        d="m 116,166 4,8 h 16 l 4,-8 z"/>
</svg>
